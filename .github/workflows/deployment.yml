name: Deployment
on:
  push:
    branches:
      -main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy a VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secerts.SSH_HOST }}
          username: ubuntu
          key: ${{ secerts.SSH_KEY }}
          script: |
            cd /home/ubuntu/portfolo/portfolio
            git pull
            docker compose up --build

         
