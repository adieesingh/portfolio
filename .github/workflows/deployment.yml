name: Deployment
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy a VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/portfolo/portfolio
            git fetch
            git pull origin master
            npm install
            npm run build
            pm2 restart portfolio || pm2 start npm --name portfolio -- start -- -p 3003
            sudo nginx -s reload


         